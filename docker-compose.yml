version: '3.8'

services:
  capital-tracker:
    build:
      context: .
      dockerfile: backend/Dockerfile
      args:
        GIT_COMMIT: ${GIT_COMMIT:-unknown}
    ports:
      - "3000:3000"
    volumes:
      - ./data:/data
    environment:
      - NODE_ENV=production
      - SESSION_SECRET=change-this-to-a-long-random-secret
      - DB_PATH=/data/capital-tracker.db
      # Push notifications — VAPID (optional but recommended for stable keys)
      # Generate once with: node -e "const wp=require('web-push');const k=wp.generateVAPIDKeys();console.log(JSON.stringify(k))"
      # - VAPID_PUBLIC_KEY=your-base64url-public-key
      # - VAPID_PRIVATE_KEY=your-base64url-private-key
      # - VAPID_SUBJECT=mailto:you@yourdomain.com
      # OIDC (optional — uncomment and fill in to enable)
      # - OIDC_ENABLED=true
      # - OIDC_ISSUER_URL=https://your-oidc-provider.com
      # - OIDC_CLIENT_ID=your-client-id
      # - OIDC_CLIENT_SECRET=your-client-secret
      # - OIDC_REDIRECT_URI=http://localhost:3000/api/auth/oidc/callback
      # - OIDC_PROVIDER_NAME=My SSO
    restart: unless-stopped
