version: '3.8'

services:
  capital-tracker:
    build:
      context: .
      dockerfile: backend/Dockerfile
      args:
        GIT_COMMIT: ${GIT_COMMIT:-unknown}
    ports:
      - "3000:3000"
    volumes:
      - ./data:/data
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - SESSION_SECRET=change-this-to-a-long-random-secret
      - DB_PATH=/data/capital-tracker.db
      # Push notifications — set in .env (VAPID_PUBLIC_KEY, VAPID_PRIVATE_KEY, VAPID_SUBJECT)
      # AI Advisor — set ANTHROPIC_API_KEY in .env (get one at console.anthropic.com)
      # Enable Banking — required to use the integration; set in .env:
      #   ENABLE_BANKING_REDIRECT_URI=https://your-domain.example.com/bank/callback
      #   (must exactly match the redirect URL whitelisted for your Enable Banking application)
      #   ENABLE_BANKING_APPLICATION_ID / ENABLE_BANKING_PRIVATE_KEY are optional
      #   operator-wide fallbacks — each dossier can also set its own in Settings.
      # OIDC (optional — uncomment and fill in to enable)
      # - OIDC_ENABLED=true
      # - OIDC_ISSUER_URL=https://your-oidc-provider.com
      # - OIDC_CLIENT_ID=your-client-id
      # - OIDC_CLIENT_SECRET=your-client-secret
      # - OIDC_REDIRECT_URI=http://localhost:3000/api/auth/oidc/callback
      # - OIDC_PROVIDER_NAME=My SSO
    restart: unless-stopped
