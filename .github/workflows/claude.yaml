name: Claude Assistant
on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned, labeled]
  pull_request_review:
    types: [submitted]

jobs:
  claude-response:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          # anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          # Or use OAuth token instead:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          # Optional: provide a prompt for automation workflows
          # prompt: "Review this PR for security issues"

          # Optional: pass advanced arguments to Claude CLI
          # claude_args: |
          #   --max-turns 10
          #   --model claude-4-0-sonnet-20250805

          # Optional: add custom plugin marketplaces
          # plugin_marketplaces: "https://github.com/user/marketplace1.git\nhttps://github.com/user/marketplace2.git"
          # Optional: install Claude Code plugins
          # plugins: "code-review@claude-code-plugins\nfeature-dev@claude-code-plugins"

          # Optional: add custom trigger phrase (default: @claude)
          # trigger_phrase: "/claude"
          # Optional: add assignee trigger for issues
          assignee_trigger: "claude"
          # Optional: add label trigger for issues
          label_trigger: "claude"
          # Optional: grant additional permissions (requires corresponding GitHub token permissions)
          # additional_permissions: |
          #   actions: read
          # Optional: allow bot users to trigger the action
          # allowed_bots: "dependabot[bot],renovate[bot]"

      # The action itself only leaves a "Create PR" link in its comment rather than opening
      # the PR (its agent sandbox doesn't have `gh` in its allowed tools, so instructing it via
      # prompt/track_progress to run `gh pr create` itself just gets denied). Open the PR here
      # instead, outside the agent's tool sandbox, using the plain GITHUB_TOKEN. Title comes
      # straight from the triggering issue (a stable, first-class part of the Actions event
      # context) rather than being scraped out of the agent's comment text.
      #
      # Title/branch/issue-number are passed via `env:`, not interpolated directly into the
      # `run:` string with ${{ }} — an issue title containing a literal double quote (or shell
      # metacharacters like $(), `` ` ``) would otherwise get re-parsed by bash instead of taken
      # as a literal value, which both breaks quoting and is a known script-injection vector for
      # untrusted issue text in Actions workflows.
      - name: Open PR for the branch Claude created
        if: steps.claude.outputs.branch_name != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRANCH_NAME: ${{ steps.claude.outputs.branch_name }}
          PR_TITLE: ${{ github.event.issue.title }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          gh pr create \
            --base main \
            --head "$BRANCH_NAME" \
            --title "$PR_TITLE" \
            --body "Closes #$ISSUE_NUMBER

          Automated by Claude Code — see the issue for context and the branch's commit(s) for implementation details." \
            || echo "PR may already exist for this branch, skipping"
