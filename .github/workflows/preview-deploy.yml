name: Preview — Deploy

on:
  push:
    branches-ignore:
      - main
      - dev

permissions:
  contents: read
  pull-requests: write

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Compute slug
        run: |
          SLUG=$(echo "${{ github.ref_name }}" | tr '[:upper:]' '[:lower:]' | tr -cs 'a-z0-9' '-' | sed 's/^-//;s/-$//')
          echo "SLUG=$SLUG" >> $GITHUB_ENV
          STACK_BASE="${{ vars.PREVIEW_STACK_BASE }}"
          STACK_BASE="${STACK_BASE:-/home/mothership/docker/stacks/capital-tracker-preview}"
          echo "STACK_DIR=$STACK_BASE/$SLUG" >> $GITHUB_ENV

      - name: Prepare stack directory
        run: mkdir -p "$STACK_DIR/data"

      - name: Generate docker-compose.yml
        run: |
          DOMAIN="${{ secrets.PREVIEW_DOMAIN }}"
          SESSION_SECRET="${{ secrets.PREVIEW_SESSION_SECRET }}"
          TRAEFIK_NETWORK="${{ vars.TRAEFIK_NETWORK }}"
          TRAEFIK_NETWORK="${TRAEFIK_NETWORK:-traefik}"
          CERT_RESOLVER="${{ vars.PREVIEW_CERT_RESOLVER }}"
          CERT_RESOLVER="${CERT_RESOLVER:-letsencrypt}"

          cat > "$STACK_DIR/docker-compose.yml" <<EOF
          services:
            app:
              image: capital-tracker:preview-${SLUG}
              container_name: capital-tracker-preview-${SLUG}
              restart: unless-stopped
              environment:
                NODE_ENV: production
                SESSION_SECRET: ${SESSION_SECRET}
                DB_PATH: /data/capital-tracker.db
                SEED_ON_EMPTY: "true"
              volumes:
                - ./data:/data
              networks:
                - traefik
              labels:
                - "traefik.enable=true"
                - "traefik.http.routers.ct-preview-${SLUG}.rule=Host(\`${SLUG}.preview.${DOMAIN}\`)"
                - "traefik.http.routers.ct-preview-${SLUG}.entrypoints=websecure"
                - "traefik.http.routers.ct-preview-${SLUG}.tls=true"
                - "traefik.http.routers.ct-preview-${SLUG}.tls.certresolver=${CERT_RESOLVER}"
                - "traefik.http.services.ct-preview-${SLUG}.loadbalancer.server.port=3000"
          networks:
            traefik:
              external: true
              name: ${TRAEFIK_NETWORK}
          EOF

      - name: Build Docker image
        run: |
          docker build \
            -t capital-tracker:preview-$SLUG \
            --build-arg GIT_COMMIT=${{ github.sha }} \
            -f backend/Dockerfile \
            .

      - name: Deploy stack
        run: |
          cd "$STACK_DIR"
          docker compose up -d --force-recreate

      - name: Comment on PR
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PR_NUMBER=$(gh pr list \
            --repo "${{ github.repository }}" \
            --head "${{ github.ref_name }}" \
            --state open \
            --json number \
            --jq '.[0].number // empty')

          if [ -z "$PR_NUMBER" ]; then
            echo "No open PR for this branch — skipping comment."
            exit 0
          fi

          URL="https://${SLUG}.preview.${{ secrets.PREVIEW_DOMAIN }}"
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          BODY="<!-- capital-tracker-preview -->
          ## Preview environment

          | | |
          |---|---|
          | **URL** | [${URL}](${URL}) |
          | **Commit** | \`${SHORT_SHA}\` |"

          EXISTING_ID=$(gh api \
            "repos/${{ github.repository }}/issues/${PR_NUMBER}/comments" \
            --jq '[.[] | select(.body | startswith("<!-- capital-tracker-preview -->"))] | .[0].id // empty')

          if [ -n "$EXISTING_ID" ]; then
            gh api --method PATCH \
              "repos/${{ github.repository }}/issues/comments/${EXISTING_ID}" \
              -f body="$BODY"
          else
            gh pr comment "$PR_NUMBER" \
              --repo "${{ github.repository }}" \
              --body "$BODY"
          fi
