name: Preview — Destroy

on:
  delete:

permissions:
  contents: read

jobs:
  destroy:
    if: github.event.ref_type == 'branch'
    runs-on: self-hosted
    steps:
      - name: Compute slug
        run: |
          SLUG=$(echo "${{ github.event.ref }}" | tr '[:upper:]' '[:lower:]' | tr -cs 'a-z0-9' '-' | sed 's/^-//;s/-$//')
          echo "SLUG=$SLUG" >> $GITHUB_ENV
          STACK_BASE="${{ vars.PREVIEW_STACK_BASE }}"
          STACK_BASE="${STACK_BASE:-/home/mothership/docker/stacks/capital-tracker-preview}"
          echo "STACK_DIR=$STACK_BASE/$SLUG" >> $GITHUB_ENV

      - name: Tear down stack
        run: |
          if [ -d "$STACK_DIR" ]; then
            echo "Destroying preview environment: $SLUG"
            cd "$STACK_DIR"
            docker compose down --rmi local
            cd /
            rm -rf "$STACK_DIR"
            echo "Destroyed: $STACK_DIR"
          else
            echo "Stack directory not found for slug '$SLUG', nothing to destroy."
          fi
