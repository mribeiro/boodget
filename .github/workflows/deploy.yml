name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build image
        run: docker build -t capital-tracker:latest -f backend/Dockerfile .

  deploy:
    runs-on: self-hosted
    needs: build
    steps:
      - name: Deploy
        working-directory: /home/mothership/docker/stacks/capital-tracker
        run: docker compose up -d --force-recreate
