name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: [self-hosted]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build image
        run: docker build -t capital-tracker:latest -f backend/Dockerfile .

      - name: Deploy
        working-directory: /capital-tracker
        run: |
          docker compose up -d
