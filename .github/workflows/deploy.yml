name: Deploy

on:
  push:
    branches:
      - main
      - dev
  workflow_dispatch:

permissions:
  contents: read

env:
  SUFFIX: ${{ github.ref_name == 'dev' && '-dev' || '' }}

jobs:
  build:
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build image
        run: docker build -t capital-tracker:latest${{ env.SUFFIX }} -f backend/Dockerfile --build-arg GIT_COMMIT=${{ github.sha }} .

  deploy:
    runs-on: self-hosted
    needs: build
    steps:
      - name: Deploy
        working-directory: /home/mothership/docker/stacks/capital-tracker${{ env.SUFFIX }}
        env:
          GIT_COMMIT: ${{ github.sha }}
        run: docker compose up -d --build --force-recreate
