name: Deploy

on:
  push:
    branches:
      - main
      - dev
  workflow_dispatch:

env:
  DEPLOY_DIR: ${{ github.ref_name == 'main' && '/prod' || '/dev' }}

jobs:
  deploy:
    runs-on: [self-hosted, Linux, X64, gpu]

    steps:
      - name: Deploy to ${{ env.DEPLOY_DIR }}
        working-directory: ${{ env.DEPLOY_DIR }}
        run: |
            cd /prod
            git pull
            docker compose -p capital-tracker down
            docker compose -p capital-tracker build
            docker compose -p capital-tracker up -d
